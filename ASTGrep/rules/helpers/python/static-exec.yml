id: python-replace-static-exec
message: Extract code executed by exec
language: Python
rule:
  all:
    - kind: call
      has:
        any:
          - pattern: exec
          - pattern: eval
          - pattern: (eval)
          - pattern: (exec)
    - has:
        kind: argument_list
        has:
          kind: string
          has:
            kind: string_content
            pattern: $DATA
    - not:
        # typical code in the six library, which is not obfuscated
        pattern: exec("""exec _code_ in _globs_, _locs_""")
    - not:
        # typical code in the compat library, which is not obfuscated
        pattern: exec("""exec code in globs, locs""")

fix: $DATA

metadata:
  extended-obfuscation: yes
  alone-unimportant: yes
  score: 50
  deobfuscate: |
    {
      "type": "fix-generate",
      "steps": [
        {"func": "decode", "source": "DATA"},
        {"func": "math_eval", "source": "DATA", "continue_on_fail": true}
      ]
    }
